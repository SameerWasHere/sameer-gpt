<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bet Tracker — The Standing Wagers</title>
  <meta name="description" content="A live ledger of standing wagers, styled like a real sportsbook. Bet slips, real stakes, real countdowns.">
  <meta property="og:title" content="Bet Tracker — The Standing Wagers">
  <meta property="og:description" content="A live ledger of standing wagers, styled like a real sportsbook. Bet slips, real stakes, real countdowns.">
  <meta property="og:image" content="/projects/images/bettracker.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/projects/artifacts/bettracker.css">
</head>
<body>
  <div class="bg"><div class="grid"></div><div class="noise"></div></div>

  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="/bettracker">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M3 12h18M3 18h18"/><path d="M8 3v18M16 3v18" opacity="0.45"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">BET<span>TRACKER</span></div>
          <div class="brand-sub">THE STANDING WAGERS</div>
        </div>
      </a>
      <div class="live-pill"><span class="live-dot"></span>LIVE</div>
    </header>

    <div class="ledger-head">
      <h1>THE <em>BOOK</em></h1>
      <div class="ledger-meta">
        <span><b id="stat-open">0</b> OPEN</span>
        <span><b id="stat-total">0</b> TOTAL</span>
        <span>TAP A SLIP&nbsp;<b>FOR THE FULL TICKET</b></span>
      </div>
    </div>

    <main class="feed" id="feed"></main>

    <div class="foot">NO REFUNDS &middot; NO MERCY</div>
  </div>

  <script src="/projects/artifacts/bettracker-data.js"></script>
  <script>
  (function () {
    var BT = window.BetTracker;
    var bets = window.BETTRACKER_BETS;
    var feed = document.getElementById('feed');
    var openCount = 0;

    bets.forEach(function (bet, idx) {
      var need = bet.winThreshold || 1;
      var state = BT.betState(bet.legs, need);
      if (state === 'live') openCount++;

      var hitCount = bet.legs.filter(function (l) { return l.status === 'hit'; }).length;
      var total = bet.legs.length;

      var pips = bet.legs.map(function (l) { return '<span class="pip ' + l.status + '"></span>'; }).join('');

      var card = document.createElement('a');
      card.className = 'summary';
      card.href = '/bettracker/' + bet.slug;
      card.dataset.state = state;
      card.dataset.expires = bet.expires;
      card.style.animationDelay = (idx * 0.09 + 0.05) + 's';

      card.innerHTML =
        '<div class="sum-top">' +
          '<span class="ticket-id">TICKET #' + BT.escapeHtml(bet.id) + '</span>' +
          '<span class="state-pill ' + state + '"><span class="pdot"></span>' + BT.stateLabel(state) + '</span>' +
        '</div>' +
        '<h2 class="sum-title">' + BT.escapeHtml(bet.title) + '</h2>' +
        '<div class="sum-matchup">' +
          '<span class="mini-av a">' + BT.escapeHtml(bet.playerA.initials) + '</span>' +
          '<span class="nm">' + BT.escapeHtml(bet.playerA.name) + '</span>' +
          '<span class="vs">VS</span>' +
          '<span class="mini-av b">' + BT.escapeHtml(bet.playerB.initials) + '</span>' +
          '<span class="nm">' + BT.escapeHtml(bet.playerB.name) + '</span>' +
        '</div>' +
        (bet.winRule ? '<div class="sum-rule ' + state + '">' + BT.TROPHY + '<span>' + BT.escapeHtml(bet.winRule) + '</span></div>' : '') +
        '<div class="sum-pips">' +
          '<span class="pips">' + pips + '</span>' +
          '<span class="sum-progress"><span>' + hitCount + '/' + total + ' HIT</span><span class="need"> &middot; NEED ' + need + '</span></span>' +
        '</div>' +
        '<div class="sum-foot">' +
          '<span class="sum-clock"><span class="cd" data-cd>--</span><span class="cl">' + (state === 'live' ? 'until settle' : 'settled') + '</span></span>' +
          '<span class="sum-view">VIEW TICKET <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>' +
        '</div>';

      feed.appendChild(card);
    });

    document.getElementById('stat-open').textContent = String(openCount).padStart(2, '0');
    document.getElementById('stat-total').textContent = String(bets.length).padStart(2, '0');

    // compact countdowns — show the largest meaningful unit
    var cards = Array.prototype.slice.call(document.querySelectorAll('.summary'));
    function tick() {
      cards.forEach(function (c) {
        var r = BT.remaining(c.dataset.expires);
        var el = c.querySelector('[data-cd]');
        if (!el) return;
        if (r.done) { el.textContent = 'FINAL'; return; }
        if (r.d > 0) el.textContent = r.d + 'd ' + r.h + 'h';
        else if (r.h > 0) el.textContent = r.h + 'h ' + r.m + 'm';
        else el.textContent = r.m + 'm ' + String(r.s).padStart(2, '0') + 's';
      });
    }
    tick();
    setInterval(tick, 1000);
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fdf6f0">
  <title>Claude Workspace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fdf6f0; color: #2d2a26;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* Top bar */
    .bar {
      display: none;
      align-items: center; gap: 12px;
      padding: 10px 14px;
      background: rgba(253,246,240,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(217,189,160,0.3);
      flex: 0 0 auto;
    }
    .bar a.back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 600; color: #b45309;
      text-decoration: none; white-space: nowrap;
    }
    .bar a.back:hover { color: #92400e; }
    .bar .title {
      font-size: 14px; font-weight: 600; color: #57534e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bar .lock-pill {
      margin-left: auto; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #92400e; background: #fdecd2;
      padding: 3px 9px; border-radius: 999px; white-space: nowrap;
    }

    iframe.frame { display: none; flex: 1 1 auto; width: 100%; border: none; background: #fdf6f0; }

    /* Centered states (gate / loading / error) */
    .center {
      flex: 1 1 auto;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 340px;
      background: #fff; border: 1px solid rgba(217,189,160,0.3);
      border-radius: 20px; padding: 34px 28px;
      box-shadow: 0 4px 24px rgba(180,140,100,0.10);
      text-align: center;
    }
    .card .icon { font-size: 38px; margin-bottom: 14px; }
    .card h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .card .sub { font-size: 13px; color: #78716c; margin-top: 8px; margin-bottom: 22px; }
    .pw-input {
      width: 100%; text-align: center; font-size: 17px;
      padding: 13px 14px; border-radius: 14px;
      border: 1.5px solid #e7d9c8; background: #fdfaf6;
      color: #2d2a26; outline: none; transition: border-color 0.15s;
    }
    .pw-input:focus { border-color: #f59e0b; }
    .pw-input.error { border-color: #ef4444; animation: shake 0.35s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }
    .btn {
      width: 100%; margin-top: 14px; font-size: 15px; font-weight: 600;
      background: #2d2a26; color: #fff; padding: 13px; border-radius: 14px;
      border: none; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn:hover { background: #44403c; }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .msg { font-size: 13px; color: #ef4444; margin-top: 13px; min-height: 16px; }
    .muted { color: #a8a29e; font-size: 14px; }
    .backlink {
      display: inline-block; margin-top: 18px; font-size: 13px;
      font-weight: 600; color: #b45309; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bar" id="bar">
    <a class="back" href="/claude">&larr; Workspace</a>
    <span class="title" id="barTitle"></span>
    <span class="lock-pill" id="lockPill" style="display:none">Protected</span>
  </div>

  <iframe class="frame" id="frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-top-navigation-by-user-activation"
    referrerpolicy="no-referrer"></iframe>

  <div class="center" id="center">
    <div class="card" id="loadingCard">
      <div class="muted">Loading&hellip;</div>
    </div>
  </div>

  <script>
    const ITER_DEFAULT = 150000;

    function artifactId() {
      // Prod serves the artifact at a clean root path (/welcome) via middleware.
      // The ?id= fallback lets the viewer work where that isn't applied (e.g.
      // local static serving). The last path segment is the id either way.
      const q = new URLSearchParams(location.search).get('id');
      if (q) return q;
      const parts = location.pathname.split('/').filter(Boolean); // ['welcome']
      return decodeURIComponent(parts[parts.length - 1] || '');
    }

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function sha256Hex(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function decrypt(blob, password) {
      const enc = new TextEncoder();
      const salt = b64ToBytes(blob.salt);
      const iv = b64ToBytes(blob.iv);
      const data = b64ToBytes(blob.ciphertext);
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: blob.iterations || ITER_DEFAULT, hash: blob.hash || 'SHA-256' },
        keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
      );
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      return new TextDecoder().decode(plain);
    }

    // Make in-artifact links break out of the iframe to the top window.
    function withTopBase(html) {
      const base = '<base target="_top">';
      if (/<head[^>]*>/i.test(html)) return html.replace(/<head[^>]*>/i, (m) => m + base);
      return base + html;
    }

    const center = document.getElementById('center');
    const frame = document.getElementById('frame');
    const bar = document.getElementById('bar');

    function renderHtml(html, title, protectedFlag) {
      document.getElementById('barTitle').textContent = title || '';
      if (protectedFlag) document.getElementById('lockPill').style.display = '';
      bar.style.display = 'flex';
      center.style.display = 'none';
      frame.style.display = 'block';
      frame.srcdoc = withTopBase(html);
      document.title = title ? `${title} · Claude Workspace` : 'Claude Workspace';
    }

    function showError(message) {
      center.innerHTML =
        '<div class="card"><div class="icon">&#x1F50D;</div>' +
        '<h1>Not found</h1>' +
        '<p class="sub">' + message + '</p>' +
        '<a class="backlink" href="/claude">&larr; Back to workspace</a></div>';
    }

    function showPasswordGate(artifact, blob) {
      center.innerHTML =
        '<div class="card">' +
          '<div class="icon">&#x1F510;</div>' +
          '<h1>' + escapeHtml(artifact.title || 'Protected') + '</h1>' +
          '<p class="sub">This artifact is password-protected.</p>' +
          '<input id="pw" class="pw-input" type="password" placeholder="Password" autocomplete="off" autofocus>' +
          '<button id="go" class="btn">Unlock</button>' +
          '<div class="msg" id="pwMsg"></div>' +
          '<a class="backlink" href="/claude">&larr; Back to workspace</a>' +
        '</div>';
      const pw = document.getElementById('pw');
      const go = document.getElementById('go');
      const msg = document.getElementById('pwMsg');
      pw.focus();

      async function attempt() {
        const password = pw.value;
        if (!password) return;
        // Fast wrong-password feedback via hash, then the real gate: decryption.
        if (artifact.passwordHash) {
          const h = await sha256Hex(password);
          if (h !== artifact.passwordHash) return fail();
        }
        try {
          go.disabled = true;
          const html = await decrypt(blob, password);
          try { sessionStorage.setItem('claude_pw_' + artifact.id, password); } catch (e) {}
          renderHtml(html, artifact.title, true);
        } catch (e) {
          go.disabled = false;
          fail();
        }
      }
      function fail() {
        msg.textContent = 'Wrong password. Try again.';
        pw.classList.add('error');
        pw.value = '';
        setTimeout(() => pw.classList.remove('error'), 400);
      }
      go.addEventListener('click', attempt);
      pw.addEventListener('keydown', (e) => { if (e.key === 'Enter') attempt(); });
      pw.addEventListener('input', () => { msg.textContent = ''; });
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function boot() {
      const id = artifactId();
      if (!id || id === 'viewer.html') { showError('No artifact specified.'); return; }
      let manifest;
      try {
        const res = await fetch('/claude/manifest.json', { cache: 'no-store' });
        manifest = await res.json();
      } catch (e) { showError('Could not load the workspace manifest.'); return; }

      const artifact = (manifest.artifacts || []).find(a => a.id === id);
      if (!artifact) { showError('No artifact named "' + escapeHtml(id) + '".'); return; }

      if (artifact.access === 'protected') {
        let blob;
        try {
          const res = await fetch('/claude/artifacts/' + artifact.filename, { cache: 'no-store' });
          blob = await res.json();
        } catch (e) { showError('Could not load this artifact.'); return; }

        // Re-use a password entered earlier this session, if it still works.
        let remembered = null;
        try { remembered = sessionStorage.getItem('claude_pw_' + artifact.id); } catch (e) {}
        if (remembered) {
          try {
            const html = await decrypt(blob, remembered);
            renderHtml(html, artifact.title, true);
            return;
          } catch (e) { /* fall through to prompt */ }
        }
        showPasswordGate(artifact, blob);
      } else {
        // Public — fetch and render directly, no auth.
        try {
          const res = await fetch('/claude/artifacts/' + artifact.filename, { cache: 'no-store' });
          const html = await res.text();
          renderHtml(html, artifact.title, false);
        } catch (e) { showError('Could not load this artifact.'); }
      }
    }

    boot();
  </script>
</body>
</html>
